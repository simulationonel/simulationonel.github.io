<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter the Woods</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0a1a0a}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
  #overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  #password-bubble{position:absolute;bottom:33%;left:48%;pointer-events:all;animation:bf 3s ease-in-out infinite}
  @keyframes bf{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .bubble-container{position:relative;background:#f0ead6;border:3px solid #2a1f10;border-radius:12px;padding:14px 18px;min-width:260px;box-shadow:4px 4px 0px rgba(0,0,0,0.3)}
  .bubble-container::after{content:'';position:absolute;bottom:-12px;left:4px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:12px solid #2a1f10}
  .bubble-container::before{content:'';position:absolute;bottom:-9px;left:7px;border-left:5px solid transparent;border-right:5px solid transparent;border-top:9px solid #f0ead6;z-index:2}
  .bubble-text{font-size:14px;color:#2a1f10;text-align:center;margin-bottom:10px;line-height:1.8}
  .password-row{display:flex;gap:6px;align-items:center}
  .password-input{flex:1;font-family:'Press Start 2P',monospace;font-size:14px;padding:8px 10px;border:2px solid #2a1f10;border-radius:4px;background:#fff;color:#2a1f10;outline:none;image-rendering:auto}
  .password-input::placeholder{color:#b5a888;font-size:11px}
  .password-input:focus{border-color:#3a7a30;box-shadow:0 0 0 2px rgba(58,122,48,0.3)}
  .submit-btn{font-family:'Press Start 2P',monospace;font-size:14px;padding:8px 14px;border:2px solid #2a1f10;border-radius:4px;background:#3a7a30;color:#fff;cursor:pointer;text-shadow:1px 1px 0 rgba(0,0,0,0.3)}
  .submit-btn:hover{background:#2e6426;transform:translate(1px,1px)}
  .error-msg{font-size:10px;color:#c44;text-align:center;margin-top:8px;min-height:14px}
  .error-msg.shake{animation:sh .3s ease}
  @keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  #success-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0e1e0e;display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
  #success-screen.show{display:flex;animation:fi 1.2s ease}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  .success-text{font-size:16px;color:#5ea84e;text-align:center;line-height:2.2;animation:sp 2s ease-in-out infinite}
  @keyframes sp{0%,100%{opacity:1}50%{opacity:.6}}
  #scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 6px)}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="scanlines"></div>
<div id="overlay">
  <div id="password-bubble">
    <div class="bubble-container">
      <div class="bubble-text">Hello! What is the<br>password to cross<br>the bridge?</div>
      <div class="password-row">
        <input type="password" class="password-input" id="passInput" placeholder="· · · · ·" autocomplete="off" autofocus>
        <button class="submit-btn" id="submitBtn">→</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>
<div id="success-screen"><div class="success-text">You may cross the bridge!<br><br>Welcome!</div></div>
<script>
const C=document.getElementById('scene'),X=C.getContext('2d'),P=3;
let W,H,cW,cH;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;cW=Math.ceil(W/P);cH=Math.ceil(H/P)}
resize();addEventListener('resize',resize);
function px(x,y,w,h,r,g,b,a){X.fillStyle=a!=null?`rgba(${r},${g},${b},${a})`:`rgb(${r},${g},${b})`;X.fillRect(Math.floor(x)*P,Math.floor(y)*P,Math.ceil(w)*P,Math.ceil(h)*P)}
let t=0;
function sr(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const RIVER_TOP=.36,RIVER_BOT=.56,BRIDGE_FAR=.36,BRIDGE_NEAR=.68,VPX=()=>cW*.46;
function onBridge(gx,gy){if(gy<cH*BRIDGE_FAR||gy>cH*BRIDGE_NEAR)return false;const p=(gy-cH*BRIDGE_FAR)/(cH*BRIDGE_NEAR-cH*BRIDGE_FAR);return Math.abs(gx-(VPX()+(cW*.48-VPX())*p*.12))<(3+p*cW*.16)+1}

// === TIME-OF-DAY SKY COLORS ===
const hour=new Date().getHours();
// Sky palette: [top_r,top_g,top_b, bot_r,bot_g,bot_b]
function getSkyColors(){
  if(hour>=6&&hour<8) return{tr:40,tg:30,tb:50, br:180,bg:100,bb:60}; // sunrise
  if(hour>=8&&hour<11) return{tr:30,tg:60,tb:110, br:80,bg:130,bb:170}; // morning
  if(hour>=11&&hour<15) return{tr:25,tg:70,tb:140, br:70,bg:140,bb:190}; // midday
  if(hour>=15&&hour<18) return{tr:40,tg:60,tb:110, br:120,bg:110,bb:80}; // afternoon
  if(hour>=18&&hour<20) return{tr:60,tg:30,tb:40, br:170,bg:80,bb:50}; // sunset
  if(hour>=20&&hour<22) return{tr:12,tg:14,tb:40, br:25,bg:25,bb:50}; // dusk
  return{tr:6,tg:10,tb:28, br:14,bg:20,bb:38}; // night (22-6)
}
const sky=getSkyColors();

function drawSky(){for(let y=0;y<cH*.22;y++){const p=y/(cH*.22);for(let x=0;x<cW;x++)px(x,y,1,1,sky.tr+(sky.br-sky.tr)*p|0,sky.tg+(sky.bg-sky.tg)*p|0,sky.tb+(sky.bb-sky.tb)*p|0)}}

// === HAWK circling in sky ===
function drawHawk(){
  // Slow lazy circle
  const cx=cW*.5+Math.sin(t*.1)*cW*.28;
  const cy=cH*.05+Math.sin(t*.14+1)*cH*.025;
  // Gentle soaring wing flap (mostly gliding)
  const glide=Math.sin(t*.6);
  const wingUp=glide>0?glide*.6:glide*.2; // mostly flat, slight dip
  const bank=Math.cos(t*.1)*.25;
  const c=24; // dark silhouette color
  // Body (3px long)
  px(cx-1|0,cy|0,3,1,c,c-4,c-8);
  // Head
  px(cx+2|0,cy|0,1,1,c+4,c,c-6);
  // Wings — simple V shape, 6px each side
  for(let w=1;w<=6;w++){
    const lift=wingUp*w*.25+bank*w*.2;
    px(cx-1-w|0,cy-lift|0,1,1,c-2,c-6,c-10);
    px(cx+1+w|0,cy+lift*.7|0,1,1,c-2,c-6,c-10);
  }
  // Tail fork
  px(cx-2|0,cy+1|0,1,1,c-4,c-8,c-12);
  px(cx-3|0,cy+1|0,1,1,c-4,c-8,c-12);
}
function drawDistantTrees(){
  const dayBoost=(hour>=8&&hour<18)?1.5:1;
  const blendStartY=cH*.17;
  const blendEndY=cH*.27;
  for(let y=cH*.08|0;y<cH*.30|0;y++)for(let x=0;x<cW;x++){
    const topEdge=cH*.08+Math.abs(Math.sin(x*.025+.5))*cH*.04+Math.abs(Math.sin(x*.07+1.5))*cH*.025+Math.abs(Math.sin(x*.13+3))*cH*.012+Math.abs(Math.sin(x*.2+5))*cH*.006;
    if(y>=topEdge){
      const d=(y-topEdge)/(cH*.20);
      // Blend factor based on absolute Y
      const blend=y<blendStartY?0:y>blendEndY?1:(y-blendStartY)/(blendEndY-blendStartY);
      // Texture noise — fades out as we approach the field to avoid noisy seam
      const n1=((Math.sin(x*.09+y*.07)*43758.5453)%1+1)%1;
      const n2=((Math.sin(x*.15-y*.11+1.3)*28461.3)%1+1)%1;
      const n3=Math.sin(x*.05+y*.04)*.5+.5;
      const tex=(n1*.4+n2*.3+n3*.3)*(1-blend); // texture fades as we blend
      const b=(.28+d*.10+tex*.12)*dayBoost;
      const gray=22*b;
      const skyAmt=.65*(1-d*.55);
      const mr=gray+sky.br*skyAmt*.38*dayBoost;
      const mg=gray+sky.bg*skyAmt*.38*dayBoost;
      const mb=gray+sky.bb*skyAmt*.38*dayBoost;
      // Field color at this y position — uses same hash noise as far field
      const fp=Math.max(0,(y-cH*.20)/(cH*(RIVER_TOP-.20)));
      const fn1=((Math.sin(x*.037+y*.029)*43758.5453)%1+1)%1;
      const fn2=((Math.sin(x*.071-y*.043+2.7)*28461.3)%1+1)%1;
      const fn=fn1*.5+fn2*.5;
      const fb2=(.25+fp*.3+fn*.05)*dayBoost;
      const fg2=34+fp*16+fn*12;
      const fr2=fg2*.22*fb2, ffg2=fg2*fb2, fb3=fg2*.16*fb2;
      const r=mr*(1-blend)+fr2*blend;
      const g=mg*(1-blend)+ffg2*blend;
      const bl=mb*(1-blend)+fb3*blend;
      px(x,y,1,1,Math.min(255,r)|0,Math.min(255,g)|0,Math.min(255,bl)|0)}}
}
function drawFarField(){
  const dayBoost=(hour>=8&&hour<18)?1.5:1;
  const mtB=.40*dayBoost;
  const mtGray=22*mtB;
  const mtR=mtGray+sky.br*.65*.38*dayBoost*.45, mtG=mtGray+sky.bg*.65*.38*dayBoost*.45, mtBl=mtGray+sky.bb*.65*.38*dayBoost*.45;
  for(let y=cH*.20|0;y<cH*RIVER_TOP|0;y++){
    const p=(y-cH*.20)/(cH*(RIVER_TOP-.20));
    for(let x=0;x<cW;x++){
      const n1=((Math.sin(x*.037+y*.029)*43758.5453)%1+1)%1;
      const n2=((Math.sin(x*.071-y*.043+2.7)*28461.3)%1+1)%1;
      const n=n1*.5+n2*.5;
      const b=(.25+p*.3+n*.05)*dayBoost;
      let g=34+p*16+n*12|0;
      const fr=g*.22*b, fg=g*b, fb=g*.16*b;
      const blend=Math.min(1,p*2.5);
      const r=mtR*(1-blend)+fr*blend;
      const gc=mtG*(1-blend)+fg*blend;
      const bl=mtBl*(1-blend)+fb*blend;
      px(x,y,1,1,Math.min(255,r)|0,Math.min(255,gc)|0,Math.min(255,bl)|0)}}
  const R=sr(333);for(let i=0;i<150;i++){const gx=R()*cW|0,gy=cH*.27+R()*(cH*RIVER_TOP-cH*.27-2)|0;const sw=Math.sin(t*.35+i*.5)*.2;px(gx+sw,gy,1,1,9,32,7);px(gx+sw,gy-1,1,1,11,38,9)}}
function drawFarBankTrees(){const bb=cH*RIVER_TOP|0,sway=Math.sin(t*.3)*.3;
  // Pre-scattered positions to avoid diagonal patterns
  const trees=[
    {xp:.04,h:1.2,l:-.8},{xp:.11,h:.9,l:.5},{xp:.18,h:1.4,l:-.3},{xp:.24,h:.7,l:1.2},
    {xp:.31,h:1.1,l:-.6},{xp:.38,h:1.5,l:.4},{xp:.44,h:.8,l:-.9},{xp:.52,h:1.3,l:.7},
    {xp:.58,h:.9,l:-1.1},{xp:.65,h:1.4,l:.3},{xp:.72,h:1.0,l:-.5},{xp:.78,h:1.2,l:.9},
    {xp:.85,h:.8,l:-.4},{xp:.91,h:1.3,l:.6},{xp:.96,h:1.0,l:-.7},{xp:.15,h:.6,l:.8}
  ];
  trees.forEach((tr,i)=>{
    const tx=cW*tr.xp,base=bb-2;
    const trH=(8+tr.h*10)|0,trW=1;
    const lean=tr.l*1.5;
    for(let dy=0;dy<trH;dy++){const lO=lean*dy/trH|0;px(tx+lO,base-dy,trW,1,36,24,12)}
    const top=base-trH;
    const numBr=3+(i%3)|0;
    const R2=sr(137+i*43);
    for(let b=0;b<numBr;b++){
      const p=b/(numBr-1);
      const by=top+p*trH*.7;
      const lO=lean*(trH-(base-by))/trH|0;
      const side=(b%2===0?1:-1)*(R2()>.3?1:-1);
      const brLen=3+R2()*6|0;
      const bx=tx+lO+side*brLen,bby=by-1-R2()*3|0;
      const st=Math.sqrt((bx-tx-lO)**2+(bby-by)**2)|0;
      for(let s=0;s<=st;s++){const pp=s/Math.max(1,st);px(tx+lO+(bx-tx-lO)*pp|0,by+(bby-by)*pp|0,1,1,36,24,12)}
      const rad=3+R2()*5|0;
      const R3=sr(200+i*31+b*17);
      for(let j=0;j<rad*rad*2.5|0;j++){
        const a=R3()*Math.PI*2,d=Math.sqrt(R3())*rad;
        const lx=bx+Math.cos(a)*d+sway,ly=bby+Math.sin(a)*d*.7;
        if(d/rad>.6&&R3()>.4)continue;
        const n=Math.sin(lx*.3+ly*.2+i)*.5+.5;
        let g=24+n*20|0;
        px(lx|0,ly|0,1,1,g*.2|0,g*.55|0,g*.15|0);
      }
    }
    // Crown — multiple overlapping clusters for fullness
    const cRad=4+tr.h*4|0;
    const R4=sr(300+i*53);
    for(let c=0;c<2;c++){
      const ox=(R4()-.5)*cRad*.8, oy=R4()*cRad*.3;
      for(let j=0;j<cRad*cRad*2.5|0;j++){
        const a=R4()*Math.PI*2,d=Math.sqrt(R4())*cRad;
        const lx=tx+lean+ox+Math.cos(a)*d+sway,ly=top-1+oy+Math.sin(a)*d*.7;
        if(d/cRad>.6&&R4()>.4)continue;
        const n=Math.sin(lx*.3+ly*.2+i*3+c)*.5+.5;
        let g=24+n*20|0;
        px(lx|0,ly|0,1,1,g*.2|0,g*.55|0,g*.15|0);
      }
    }
  });
}

// === RIVER (flows left to right) ===
function drawRiver(){const rT=cH*RIVER_TOP|0,rB=cH*RIVER_BOT|0;for(let x=0;x<cW;x++){px(x,rT-1,1,2,50,40,26);px(x,rB,1,2,50,40,26)}for(let y=rT;y<rB;y++){const n=(y-rT)/(rB-rT);for(let x=0;x<cW;x++){
  // Base dark water
  let r=12,g=36,b=60;
  // Small wave crests — thin horizontal bands that scroll right
  // Each row of waves is offset so they tile naturally
  const row=((y-rT)*1.3)|0;
  const wavePhase=(x-t*16+row*7)*.09;
  const crest=Math.sin(wavePhase);
  // Only bright at the peak of each small wave
  if(crest>.6){const intensity=(crest-.6)/.4;r=12+intensity*35|0;g=36+intensity*55|0;b=60+intensity*60|0}
  else if(crest>.2){r=16;g=42;b=70}
  // Secondary smaller ripples offset
  const rip=Math.sin((x-t*20+row*13)*.15);
  if(rip>.7){r=Math.min(255,r+12);g=Math.min(255,g+18);b=Math.min(255,b+16)}
  if(n<.04||n>.96){r=r*.5|0;g=g*.5|0;b=b*.5|0}
  px(x,y,1,1,r,g,b)}}}

// === BRIDGE ===
function drawBridge(){const farY=cH*BRIDGE_FAR|0,nearY=cH*BRIDGE_NEAR|0,vpx=VPX();for(let y=farY;y<=nearY;y++){const p=(y-farY)/(nearY-farY),halfW=3+p*cW*.16,cx=vpx+(cW*.48-vpx)*p*.12;for(let x=cx-halfW|0;x<=cx+halfW|0;x++){if(x<0||x>=cW)continue;const ac=Math.abs(x-cx)/halfW;if(ac>.94)px(x,y,1,1,48,35,18);else if(ac>.87)px(x,y,1,1,62,46,25);else if(y%Math.max(2,5-p*3|0)===0)px(x,y,1,1,70,52,28);else{const pv=Math.sin(x*.25+y*.12)*.5+.5;px(x,y,1,1,pv>.5?115:102,pv>.5?85:75,pv>.5?52:44)}}}for(let i=0;i<10;i++){const p=i/9,y=farY+p*(nearY-farY)|0,halfW=3+p*cW*.16,cx=vpx+(cW*.48-vpx)*p*.12,postH=2+p*14|0,postW=1+p*2|0;[-1,1].forEach(s=>{const postX=cx+halfW*.94*s|0;for(let ph=0;ph<postH;ph++)px(postX,y-ph,postW,1,44,32,16);px(postX-1,y-postH,postW+2,(1+p)|0,52,38,20)})}[-1,1].forEach(s=>{for(let y=farY;y<=nearY;y++){const p=(y-farY)/(nearY-farY),halfW=3+p*cW*.16,cx=vpx+(cW*.48-vpx)*p*.12,postX=cx+halfW*.94*s|0,sp=Math.max(4,14-p*10|0),lp=((y-farY)%sp)/sp,sag=Math.sin(lp*Math.PI)*(1+p*3.5)|0;px(postX,y-(1+p*10|0)+sag,1,1,138,118,78)}})}

// === NEAR GROUND ===
function drawNearGround(){const top=cH*RIVER_BOT|0;const R=sr(55);const dayBoost=(hour>=8&&hour<18)?1.35:1;for(let y=top;y<cH;y++){const d=(y-top)/(cH-top);for(let x=0;x<cW;x++){const n1=((Math.sin(x*.037+y*.029)*43758.5453)%1+1)%1;const n2=((Math.sin(x*.071-y*.043+2.7)*28461.3)%1+1)%1;const v=n1*.5+n2*.5;const b=(.35+d*.65)*dayBoost;let g;if(v<.18)g=30;else if(v<.38)g=36;else if(v<.58)g=44;else if(v<.78)g=52;else g=58;px(x,y,1,1,Math.min(255,g*.24*b)|0,Math.min(255,g*b)|0,Math.min(255,g*.14*b)|0)}}}

// === GRASS (skip bridge) ===
function drawGrass(){const nearTop=cH*RIVER_BOT|0;const R=sr(777);const dayBoost=(hour>=8&&hour<18)?1.3:1;for(let i=0;i<600;i++){const gx=R()*cW|0,gy=nearTop+2+R()*(cH-nearTop-4)|0;if(onBridge(gx,gy))continue;const d=(gy-nearTop)/(cH-nearTop),b=(.36+d*.64)*dayBoost;const lean=(Math.sin(i*1.7+t*.5)*.8+(i%3-.5)*.4);const bladeH=1+d*2.5|0;const gVar=48+((i*7)%35);for(let dy=0;dy<bladeH;dy++){const g=Math.min(255,(gVar+dy*6)*b)|0;const xOff=lean*dy/Math.max(1,bladeH);px(gx+xOff|0,gy-dy,1,1,Math.min(255,g*.26)|0,g,Math.min(255,g*.14)|0)}}}

// === LEAF/BRANCH ===
function drawLeafCluster(cx,cy,radius,seed,sway){const R2=sr(seed);const count=radius*radius*3.2|0;for(let i=0;i<count;i++){const angle=R2()*Math.PI*2,dist=Math.sqrt(R2())*radius,lx=cx+Math.cos(angle)*dist+sway,ly=cy+Math.sin(angle)*dist*.75;if(dist/radius>.62&&R2()>.42)continue;const n=Math.sin(lx*.12+ly*.1+seed)*.5+.5;let g;if(n<.3)g=26;else if(n<.55)g=36;else if(n<.8)g=48;else g=56;if(Math.sin(angle)>.3)g=g*.78|0;px(lx|0,ly|0,1,1,g*.22|0,g,g*.16|0)}}
function drawBranch(x1,y1,x2,y2,w){const steps=Math.sqrt((x2-x1)**2+(y2-y1)**2)|0;for(let s=0;s<=steps;s++){const p=s/Math.max(1,steps);px(x1+(x2-x1)*p|0,y1+(y2-y1)*p+Math.sin(p*3)*1.5|0,w,1,40,28,14)}}

// === FOREGROUND TREES (explicit branches, denser top/center leaf clusters) ===
function drawFgTrees(){
  const ls=Math.sin(t*.2)*1.5,rs=Math.sin(t*.25+1)*1;

  function drawRoots(cx,bot,w,seed){
    const R2=sr(seed);
    for(let i=0;i<3+R2()*3|0;i++){const dir=(R2()-.5)*2,len=w*.4+R2()*w*.6;for(let s=0;s<len;s++){const p=s/len;px(cx+dir*s*.8|0,bot-1+p*3+Math.sin(s*.3+i)|0,2,1,36+R2()*8|0,26+R2()*6|0,12+R2()*4|0)}}
    for(let i=0;i<8+R2()*6|0;i++){px(cx-w*.3+R2()*w*.6|0,bot+R2()*3|0,1+R2()*2|0,1,20+R2()*10|0,42+R2()*12|0,10+R2()*5|0)}
  }

  // LEFT EDGE

function drawExtraBushes(){
  [{x:cW*.10,w:140,h:50,seed:770},{x:cW*.88,w:169,h:60,seed:789}].forEach((b,i)=>{
    const R2=sr(b.seed);
    const profile=[];
    for(let dx=-b.w/2|0;dx<=b.w/2|0;dx++){
      const nx=dx/(b.w/2);
      const h1=Math.max(0,1-nx*nx)*b.h*.6;
      const h2=Math.max(0,1-(nx-.3)*(nx-.3)*4)*b.h*.35;
      const h3=Math.max(0,1-(nx+.25)*(nx+.25)*5)*b.h*.3;
      const h4=Math.max(0,1-(nx+.5)*(nx+.5)*8)*b.h*.2;
      profile.push(Math.max(h1,h2,h3,h4)+b.h*.35);
    }
    for(let dx=-b.w/2|0;dx<=b.w/2|0;dx++){
      const colH=profile[dx+(b.w/2|0)]|0;
      for(let dy=0;dy<colH;dy++){
        const lx=b.x+dx,ly=cH-1-dy;
        if(ly<0)continue;
        const topDist=dy/colH;
        if(topDist>.88){const n=((Math.sin(lx*.37+ly*.29)*43758.5)%1+1)%1;if(n<.4)continue}
        const n1=((Math.sin(lx*.13+ly*.17+i*3.7)*43758.5453)%1+1)%1;
        const n2=((Math.sin(lx*.21-ly*.11+i*7.3)*28461.3)%1+1)%1;
        const v=n1*.6+n2*.4;
        if(v<.08)continue;
        // Dark green-purple palette
        let g;if(v<.25)g=14;else if(v<.45)g=20;else if(v<.65)g=28;else if(v<.82)g=34;else g=38;
        const yBright=.65+topDist*.35;
        if(n1>.85)g=Math.min(42,g+5);
        g=g*yBright|0;
        px(lx|0,ly,1,1,g*.28+4|0,g,g*.12+6|0);

  });
}

// === BUTTERFLIES (daytime) / FIREFLIES (night) ===
function drawButterflies(){
  for(let i=0;i<6;i++){
    // Fluttery path — bobbing, drifting
    const bxBase=[.08,.28,.48,.65,.78,.90][i];
    const bx=cW*bxBase+Math.sin(t*.18+i*2.3)*cW*.04+Math.cos(t*.07+i*1.1)*cW*.02;
    const byBase=[.35,.43,.51,.32,.59,.67][i];
    const by=cH*byBase+Math.sin(t*.25+i*1.7)*cH*.06+Math.cos(t*.4+i*2.9)*cH*.02;
    const wingFlap=Math.sin(t*4+i*2); // fast flapping
    const wingOpen=Math.abs(wingFlap); // 0=closed, 1=open
    // Body (tiny dark line)
    px(bx|0,by|0,1,2,30,20,10);
    // Wings — orange with black tips, size varies with flap
    const ws=1+wingOpen*2|0;
    // Left wing
    px(bx-ws|0,by-1|0,ws,1,210,120,20);
    px(bx-ws|0,by|0,ws,1,190,100,15);
    if(wingOpen>.5) px(bx-ws-1|0,by-1|0,1,1,40,30,20); // black tip
    // Right wing
    px(bx+1|0,by-1|0,ws,1,210,120,20);
    px(bx+1|0,by|0,ws,1,190,100,15);
    if(wingOpen>.5) px(bx+ws+1|0,by-1|0,1,1,40,30,20); // black tip
    // White spots on wings when open
    if(wingOpen>.6){
      px(bx-ws+1|0,by-1|0,1,1,240,230,210);
      px(bx+ws|0,by-1|0,1,1,240,230,210);
    }
  }
}
function drawFireflies(){
  // Background fireflies (far side of river)
  for(let i=0;i<4;i++){
    const fx=cW*(.1+i*.25)+Math.sin(t*.08+i*2.4)*cW*.06;
    const fy=cH*.26+Math.cos(t*.12+i*1.9)*cH*.04;

  }
  // Mid-foreground fireflies
  for(let i=0;i<8;i++){

    const baseY=cH*(.58+((i*37+13)%20)*.007);
    const fx=baseX+Math.sin(t*.12+i*2.1)*cW*.04;
    const fy=baseY+Math.cos(t*.18+i*1.5)*cH*.03;

    const fy=cH*.78+Math.cos(t*.13+i*2.5)*cH*.05;

}
function drawCreatures(){if(hour>=8&&hour<18)drawButterflies();else drawFireflies()}

// === STARS (night only) ===
function drawStars(){
  const R=sr(9999);
  for(let i=0;i<30;i++){
    const sx=R()*cW|0,sy=R()*cH*.12|0;

}
